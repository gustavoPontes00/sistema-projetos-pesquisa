<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Projetos de Pesquisa</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Sistema de Projetos de Pesquisa</h1>
    <p>Gerencie seus projetos acadêmicos com facilidade</p>
    <div class="header-botoes">
      <button id="btnLogin" onclick="abrirModal('login')">Fazer Login</button>
      <button id="btnCadastro" onclick="abrirModal('cadastro')">Cadastrar</button>
    </div>
  </header>

  <main>
    <img src="img/Projeto-de-pesquisa.png" alt="Projetos de Pesquisa">
    <h2>Bem-vindo ao Sistema</h2>
    <p>Cadastro e acompanhamento de projetos de pesquisa institucionais.</p>
  </main>

  <!-- Modal Login -->
  <div id="modalLogin" class="modal">
    <div class="modal-content">
      <span onclick="fecharModal('login')" class="fechar">&times;</span>
      <h2>Login</h2>
      <input type="text" id="loginUsuario" placeholder="Usuário" />
      <input type="password" id="loginSenha" placeholder="Senha" />
      <p id="erroLogin" class="erro"></p>
      <button onclick="entrar()">Entrar</button>
    </div>
  </div>

  <!-- Modal Cadastro -->
  <div id="modalCadastro" class="modal">
    <div class="modal-content">
      <span onclick="fecharModal('cadastro')" class="fechar">&times;</span>
      <h2>Cadastro</h2>
      <input type="text" id="cadastroNome" placeholder="Nome completo" />
      <input type="text" id="cadastroLogin" placeholder="Usuário" />
      <input type="password" id="cadastroSenha" placeholder="Senha" />
      <p id="erroCadastro" class="erro"></p>
      <button onclick="cadastrar()">Cadastrar</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
