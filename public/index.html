<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Projetos de Pesquisa</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Sistema de Projetos de Pesquisa</h1>
    <p>Gerencie seus projetos acadêmicos com facilidade</p>
    <button id="btnLogin" onclick="abrirModal()">Fazer Login</button>
  </header>

  <main>
    <img src="img/Projeto-de-pesquisa.png" alt="Projetos de Pesquisa">
    <h2>Bem-vindo ao Sistema</h2>
    <p>Cadastro e acompanhamento de projetos de pesquisa institucionais.</p>
  </main>

  <!-- Modal -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <span onclick="fecharModal()" class="fechar">&times;</span>
      <h2>Login</h2>
      <input type="text" id="login" placeholder="Usuário" />
      <input type="password" id="senha" placeholder="Senha" />
      <button onclick="entrar()">Entrar</button>
    </div>
  </div> 

  <script src="script.js"></script>
</body>
</html>
